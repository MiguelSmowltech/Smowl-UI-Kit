<!DOCTYPE html>
<!-- ============================================================
   GALLERY COMPONENT — Página de demostración
   ============================================================
   Esta página muestra cómo funciona el componente
   "gallery-component" en diferentes situaciones.

   Autor: Smowltech Design System
   Más información en:
   https://github.com/MiguelSmowltech/Smowl-UI-Kit
   ============================================================ -->

<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery Component — Demostración</title>

  <!-- Cargamos el componente -->
  <script type="module" src="gallery.js"></script>

  <style>
    /* ============================================================
       ESTILOS DE LA PÁGINA
       ============================================================
       Estos estilos son solo para la página de demostración.
       No afectan al componente gallery-component.
       ============================================================ */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex; min-height: 100vh;
      background: #f0f0f5;
      font-family: 'Montserrat', sans-serif;
    }

    :root {
      --color-brand-500: #0092D1;
      --color-neutral-0: #FFFFFF;
      --color-primary-700: #1C304B;
      --color-primary-600: #5C6573;
      --color-primary-200: #E0E0E4;
      --color-primary-100: #EBEBEE;
      --color-primary-800: #0B131E;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-round: 64px;
    }

    /* Diseño de la página */
    .app { display: flex; width: 100%; }

    /* Menú lateral */
    .aside {
      width: 320px; min-height: 100vh;
      background: var(--color-neutral-0);
      border-right: 1px solid var(--color-primary-100);
      padding: 24px; overflow-y: auto; flex-shrink: 0;
    }

    .aside__title {
      font-size: 20px; font-weight: 600;
      color: var(--color-primary-700); margin-bottom: 4px;
    }

    .aside__subtitle {
      font-size: 13px; color: var(--color-primary-600);
      margin-bottom: 24px;
    }

    .aside__group { margin-bottom: 20px; }

    .aside__group-title {
      font-size: 12px; font-weight: 600;
      color: var(--color-primary-600);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    /* Interruptor (encender/apagar) */
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .toggle__label {
      font-size: 14px; color: var(--color-primary-700); flex: 1;
    }

    .switch {
      width: 36px; height: 20px;
      background: var(--color-primary-200);
      border-radius: var(--radius-round);
      border: none; cursor: pointer;
      position: relative; transition: background 0.2s;
      flex-shrink: 0;
    }

    .switch.active { background: var(--color-brand-500); }

    .switch::after {
      content: '';
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px;
      background: white; border-radius: 50%;
      transition: transform 0.2s;
    }

    .switch.active::after { transform: translateX(16px); }

    /* Selector de tamaño */
    .select-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .select-control label {
      font-size: 14px; color: var(--color-primary-700);
    }

    .select-control select {
      padding: 4px 8px;
      border: 1px solid var(--color-primary-100);
      border-radius: var(--radius-sm);
      font-family: inherit; font-size: 13px;
      width: 80px; text-align: center;
    }

    /* Botón de pantalla completa */
    .btn {
      display: block; width: 100%; padding: 10px;
      background: var(--color-brand-500); color: white;
      border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer; margin-bottom: 8px;
      transition: background 0.2s;
    }

    .btn:hover { background: #0078b3; }

    /* Contenido principal */
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 40px;
      overflow-y: auto;
    }

    .main-top { margin-bottom: 40px; }

    /* Pantalla completa */
    body.is-fullscreen { background: var(--color-primary-800); }
    body.is-fullscreen .aside { display: none; }
    body.is-fullscreen main { padding: 0; }
    body.is-fullscreen gallery-component {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      max-width: 100vw; max-height: 100vh;
      border-radius: 0; z-index: 9999;
    }
    body.is-fullscreen gallery-component::part(slide) {
      flex: 1; height: auto; min-height: 0;
    }
    body.is-fullscreen gallery-component::part(thumbnails) {
      width: 100%; align-self: stretch;
    }
    body.is-fullscreen gallery-component::part(prev-btn),
    body.is-fullscreen gallery-component::part(next-btn) { opacity: 1; }

    /* Botón de cerrar pantalla completa */
    .fullscreen-btn-close {
      display: none;
      position: fixed; top: 20px; right: 20px;
      width: 40px; height: 40px;
      border: none; border-radius: var(--radius-round);
      background: var(--color-neutral-0);
      align-items: center; justify-content: center;
      cursor: pointer; padding: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 10000;
    }

    body.is-fullscreen .fullscreen-btn-close { display: flex; }

    .fullscreen-btn-close svg {
      width: 24px; height: 24px; fill: var(--color-primary-700);
    }

    /* Si la pantalla es pequeña */
    @media (max-width: 900px) {
      .app { flex-direction: column; }
      .aside { width: 100%; min-height: auto; }
      main { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ============================================================
         MENÚ LATERAL
         ============================================================
         Controles para probar el componente en vivo.
         ============================================================ -->

    <aside class="aside">
      <div class="aside__title">Gallery</div>
      <div class="aside__subtitle">Web Component — Demostración</div>

      <div class="aside__group">
        <div class="aside__group-title">Miniaturas</div>
        <div class="toggle">
          <span class="toggle__label">Mostrar miniaturas</span>
          <button class="switch active" id="toggleThumbs"
                  role="switch" aria-checked="true"
                  aria-label="Mostrar miniaturas"></button>
        </div>
      </div>

      <div class="aside__group">
        <div class="aside__group-title">Tamaño</div>
        <div class="select-control">
          <label for="viewportSelect">Viewport</label>
          <select id="viewportSelect">
            <option value="1920">1920 × 1080</option>
            <option value="1440" selected>1440 × 900</option>
            <option value="1280">1280 × 800</option>
          </select>
        </div>
      </div>

      <div class="aside__group">
        <div class="aside__group-title">Texto</div>
        <div class="toggle">
          <span class="toggle__label">Mostrar caption</span>
          <button class="switch" id="toggleCaption"
                  role="switch" aria-checked="false"
                  aria-label="Mostrar caption"></button>
        </div>
      </div>

      <div class="aside__group"
           style="border-top:1px solid var(--color-primary-100);padding-top:16px;">
        <button class="btn" id="btnFullscreen"
                aria-expanded="false">
          Pantalla completa
        </button>
      </div>

      <!-- Atajos de teclado -->
      <div class="aside__group">
        <div class="aside__group-title">Teclado</div>
        <div style="font-size:12px;color:var(--color-primary-600);line-height:1.8;">
          <kbd style="padding:1px 5px;border:1px solid var(--color-primary-100);border-radius:3px;">F</kbd> Pantalla completa<br>
          <kbd style="padding:1px 5px;border:1px solid var(--color-primary-100);border-radius:3px;">←</kbd>
          <kbd style="padding:1px 5px;border:1px solid var(--color-primary-100);border-radius:3px;">→</kbd> Anterior / Siguiente<br>
          <kbd style="padding:1px 5px;border:1px solid var(--color-primary-100);border-radius:3px;">Esc</kbd> Salir de pantalla completa<br>
          <kbd style="padding:1px 5px;border:1px solid var(--color-primary-100);border-radius:3px;">↕</kbd> Navegar miniaturas<br>
          <kbd style="padding:1px 5px;border:1px solid var(--color-primary-100);border-radius:3px;">⏎</kbd> Seleccionar miniatura
        </div>
      </div>
    </aside>

    <!-- ============================================================
         CONTENIDO PRINCIPAL
         ============================================================ -->

    <main>
      <div class="main-top">
        <gallery-component id="gallery"></gallery-component>
      </div>
    </main>

    <!-- Botón de cerrar que solo se ve en pantalla completa -->
    <button class="fullscreen-btn-close" id="fsClose"
            aria-label="Cerrar pantalla completa">
      <svg viewBox="0 0 24 24">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>

  </div>

  <!-- ============================================================
       CÓDIGO JAVASCRIPT DE LA PÁGINA
       ============================================================ -->

  <script type="module">
    import './gallery.js';

    // ============================================================
    // 1. Configurar las imágenes
    // ============================================================

    const gallery = document.getElementById('gallery');

    gallery.images = [
      {
        src: 'https://picsum.photos/608/342?random=11',
        thumb: 'https://picsum.photos/160/90?random=11',
        alt: 'Paisaje montañoso',
        title: 'Montañas',
        desc: 'Vista panorámica de la cordillera'
      },
      {
        src: 'https://picsum.photos/608/342?random=12',
        thumb: 'https://picsum.photos/160/90?random=12',
        alt: 'Ciudad moderna',
        title: 'Arquitectura',
        desc: 'Edificios contemporáneos'
      },
      {
        src: 'https://picsum.photos/608/342?random=13',
        thumb: 'https://picsum.photos/160/90?random=13',
        alt: 'Error al cargar',
        title: 'Error',
        desc: 'Esta imagen tiene un error',
        error: true
      },
      {
        src: 'https://picsum.photos/608/342?random=14',
        thumb: 'https://picsum.photos/160/90?random=14',
        alt: 'Naturaleza',
        title: 'Naturaleza',
        desc: 'Bosque y vegetación'
      },
      {
        src: 'https://picsum.photos/608/342?random=15',
        thumb: 'https://picsum.photos/160/90?random=15',
        alt: 'Mar y playa',
        title: 'Mar',
        desc: 'Atardecer en la playa'
      },
      {
        src: 'https://picsum.photos/608/342?random=16',
        thumb: 'https://picsum.photos/160/90?random=16',
        alt: 'Arte urbano',
        title: 'Arte',
        desc: 'Mural callejero'
      },
    ];

    // ============================================================
    // 2. Pantalla completa
    // ============================================================

    let isFullscreen = false;

    function toggleFullscreen() {
      isFullscreen = !isFullscreen;
      document.body.classList.toggle('is-fullscreen', isFullscreen);
      document.getElementById('btnFullscreen')
        .setAttribute('aria-expanded', isFullscreen);
    }

    // Botones de pantalla completa
    document.getElementById('btnFullscreen')
      .addEventListener('click', toggleFullscreen);
    document.getElementById('fsClose')
      .addEventListener('click', toggleFullscreen);

    // Doble clic en la imagen
    gallery.addEventListener('fullscreen-toggle', toggleFullscreen);

    // Teclado
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isFullscreen) toggleFullscreen();
      if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        toggleFullscreen();
      }
    });

    // ============================================================
    // 3. Controles del menú lateral
    // ============================================================

    function setupToggle(id, prop) {
      const btn = document.getElementById(id);
      btn.addEventListener('click', () => {
        const val = !gallery[prop];
        gallery[prop] = val;
        btn.classList.toggle('active', val);
        btn.setAttribute('aria-checked', val);
      });
    }

    setupToggle('toggleThumbs', 'showThumbnails');
    setupToggle('toggleCaption', 'showCaption');

    // Selector de tamaño
    document.getElementById('viewportSelect')
      .addEventListener('change', (e) => {
        const v = e.target.value;
        gallery.viewport = { 1920: 'large', 1440: 'medium', 1280: 'small' }[v];
      });
  </script>
</body>
</html>
