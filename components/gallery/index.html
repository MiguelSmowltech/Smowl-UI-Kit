<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery Component — Demo</title>
  <script type="module" src="gallery.js"></script>
  <link rel="stylesheet" href="../../tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; min-height: 100vh; background: #f0f0f5; font-family: 'Montserrat', sans-serif; }
    :root {}
    .app { display: flex; width: 100%; }
    .aside { width: 300px; min-height: 100vh; background: var(--color-neutral-0, #fff); border-right: 1px solid var(--color-primary-100, #EBEBEE); padding: 24px; overflow-y: auto; flex-shrink: 0; }
    .aside__title { font-size: 20px; font-weight: 600; color: var(--color-primary-700, #1C304B); margin-bottom: 4px; }
    .aside__subtitle { font-size: 13px; color: var(--color-primary-600, #5C6573); margin-bottom: 24px; }
    .aside__group { margin-bottom: 20px; }
    .aside__group-title { font-size: 12px; font-weight: 600; color: var(--color-primary-600, #5C6573); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .toggle { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
    .toggle__label { font-size: 14px; color: var(--color-primary-700, #1C304B); flex: 1; }
    .switch { width: 36px; height: 20px; background: var(--color-primary-200, #E0E0E4); border-radius: 64px; border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .switch.active { background: var(--color-brand-500, #0092D1); }
    .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
    .switch.active::after { transform: translateX(16px); }
    .select-control { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .select-control label { font-size: 14px; color: var(--color-primary-700, #1C304B); }
    .select-control select { padding: 4px 8px; border: 1px solid var(--color-primary-100, #EBEBEE); border-radius: var(--radius-sm, 4px); font-family: inherit; font-size: 13px; width: 80px; text-align: center; }
    .btn { display: block; width: 100%; padding: 10px; background: var(--color-brand-500, #0092D1); color: white; border: none; border-radius: var(--radius-sm, 4px); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #0078b3; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px; overflow-y: auto; }
    .main-top { margin-bottom: 40px; }
    body.is-fullscreen .aside { display: none; }
    body.is-fullscreen main { padding: 0; }
    @media (max-width: 900px) { .app { flex-direction: column; } .aside { width: 100%; min-height: auto; } main { padding: 20px; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="aside">
      <div class="aside__title">Gallery</div>
      <div class="aside__subtitle">Web Component</div>
      <div class="aside__group">
        <div class="aside__group-title">Miniaturas</div>
        <div class="toggle">
          <span class="toggle__label">Mostrar miniaturas</span>
          <button class="switch active" id="toggleThumbs" role="switch" aria-checked="true" aria-label="Mostrar miniaturas"></button>
        </div>
      </div>
      <div class="aside__group">
        <div class="aside__group-title">Tamaño</div>
        <div class="select-control">
          <label for="viewportSelect">Viewport</label>
          <select id="viewportSelect">
            <option value="1920">1920 × 1080</option>
            <option value="1440" selected>1440 × 900</option>
            <option value="1280">1280 × 800</option>
          </select>
        </div>
      </div>
      <div class="aside__group">
        <div class="aside__group-title">Texto</div>
        <div class="toggle">
          <span class="toggle__label">Mostrar caption</span>
          <button class="switch" id="toggleCaption" role="switch" aria-checked="false" aria-label="Mostrar caption"></button>
        </div>
      </div>
      <div class="aside__group" style="border-top:1px solid var(--color-primary-100,#EBEBEE);padding-top:16px;">
        <button class="btn" id="btnFullscreen" aria-expanded="false">Pantalla completa</button>
      </div>
    </aside>
    <main>
      <div class="main-top">
        <gallery-component id="gallery"></gallery-component>
      </div>
    </main>
  </div>

  <script type="module">
    import './gallery.js';

    const images = [
      { src: 'https://picsum.photos/608/342?random=11', thumb: 'https://picsum.photos/160/90?random=11', alt: 'Paisaje montañoso', title: 'Montañas', desc: 'Vista panorámica de la cordillera' },
      { src: 'https://picsum.photos/608/342?random=12', thumb: 'https://picsum.photos/160/90?random=12', alt: 'Ciudad moderna', title: 'Arquitectura', desc: 'Edificios contemporáneos' },
      { src: 'https://picsum.photos/608/342?random=13', thumb: 'https://picsum.photos/160/90?random=13', alt: 'Error al cargar', title: 'Error', desc: 'Esta imagen tiene un error', error: true },
      { src: 'https://picsum.photos/608/342?random=14', thumb: 'https://picsum.photos/160/90?random=14', alt: 'Naturaleza', title: 'Naturaleza', desc: 'Bosque y vegetación' },
      { src: 'https://picsum.photos/608/342?random=15', thumb: 'https://picsum.photos/160/90?random=15', alt: 'Mar y playa', title: 'Mar', desc: 'Atardecer en la playa' },
      { src: 'https://picsum.photos/608/342?random=16', thumb: 'https://picsum.photos/160/90?random=16', alt: 'Arte urbano', title: 'Arte', desc: 'Mural callejero' },
    ];

    const gallery = document.getElementById('gallery');
    gallery.images = images;

    function toggleFullscreen() {
      const isOn = !gallery.fullscreen;
      gallery.fullscreen = isOn;
      document.body.classList.toggle('is-fullscreen', isOn);
      document.getElementById('btnFullscreen').setAttribute('aria-expanded', isOn);
    }
    document.getElementById('btnFullscreen').addEventListener('click', toggleFullscreen);
    gallery.addEventListener('fullscreen-toggle', toggleFullscreen);
    gallery.addEventListener('fullscreen-change', (e) => {
      document.body.classList.toggle('is-fullscreen', e.detail.fullscreen);
      document.getElementById('btnFullscreen').setAttribute('aria-expanded', e.detail.fullscreen);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && gallery.fullscreen) gallery.fullscreen = false;
      if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); }
    });

    function setupToggle(id, prop) {
      const btn = document.getElementById(id);
      btn.addEventListener('click', () => {
        const val = !gallery[prop];
        gallery[prop] = val;
        btn.classList.toggle('active', val);
        btn.setAttribute('aria-checked', val);
      });
    }
    setupToggle('toggleThumbs', 'showThumbnails');
    setupToggle('toggleCaption', 'showCaption');
    document.getElementById('viewportSelect').addEventListener('change', (e) => {
      gallery.viewport = { 1920: 'large', 1440: 'medium', 1280: 'small' }[e.target.value];
    });
  </script>
</body>
</html>
