<!-- ============================================================
   TEMPLATE DEL COMPONENTE gallery-component
   ============================================================
   Este archivo contiene el HTML y CSS del componente.
   gallery.js lo carga automáticamente.
   ============================================================ -->

<template id="gallery-template">
<style>
  /* ============================================================
     ESTILOS DE LA GALERÍA
     ============================================================
     Aquí se define cómo se ve el componente.
     Los colores se pueden cambiar desde fuera
     con las variables CSS.
     ============================================================ */

  :host {
    --color-brand-500: #0092D1;
    --color-danger-500: #C51321;
    --color-danger-100: #FBD0D4;
    --color-primary-700: #1C304B;
    --color-primary-800: #0B131E;
    --color-primary-100: #EBEBEE;
    --color-primary-200: #E0E0E4;
    --color-primary-400: #ADADB5;
    --color-primary-600: #5C6573;
    --color-neutral-0: #FFFFFF;
    --color-info-500: #0061F4;
    --border-secondary: #EBEBEE;
    --radius-md: 8px;
    --radius-sm: 4px;
    --radius-round: 64px;
    --spacing-2xs: 8px;
    --gap: 16px;

    display: block;
    font-family: 'Montserrat', sans-serif;
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  /* La galería entera */
  .gallery {
    display: flex;
    flex-direction: column;
    max-width: 100%;
    background: var(--color-primary-800);
    border-radius: var(--radius-md);
    overflow: hidden;
    position: relative;
  }

  /* Tamaños según el viewport */
  .gallery--large  { width: 1000px; }
  .gallery--medium { width: 803px; }
  .gallery--small  { width: 640px; }

/* ============================================================
     ESTILOS DE PANTALLA COMPLETA
     ============================================================
     Cuando el atributo "fullscreen" está presente,
     la galería ocupa toda la pantalla.

     :host([fullscreen]) significa:
     "el componente que tiene el atributo fullscreen".
     ============================================================ */
  :host([fullscreen]) .gallery {
    position: fixed;
    inset: 0;
    width: 100vw !important;
    height: 100vh;
    max-width: 100vw;
    max-height: 100vh;
    border-radius: 0;
    z-index: 9999;
  }

  :host([fullscreen]) .gallery__main {
    flex: 1;
    height: auto !important;
    min-height: 0;
  }

  :host([fullscreen]) .gallery__image {
    object-fit: contain;
  }

  :host([fullscreen]) .gallery__thumbnails {
    width: 100%;
    align-self: stretch;
  }

  :host([fullscreen]) .gallery__nav-btn { opacity: 1; }
  :host([fullscreen]) .gallery__nav--prev { left: 0; padding: 10px; }
  :host([fullscreen]) .gallery__nav--next { right: 0; padding: 10px; }

  /* Botón de cerrar en pantalla completa */
  .gallery__close-btn {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: var(--radius-round);
    background: var(--color-neutral-0);
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 10000;
  }

  :host([fullscreen]) .gallery__close-btn { display: flex; }
  .gallery__close-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .gallery__close-btn:focus-visible { outline: 2px solid var(--color-brand-500); outline-offset: 2px; }
  .gallery__close-btn svg { width: 24px; height: 24px; fill: var(--color-primary-700); }

  /* Área donde se ve la imagen grande */
  .gallery__main {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gallery--large  .gallery__main { height: 440px; }
  .gallery--medium .gallery__main { height: 342px; }
  .gallery--small  .gallery__main { height: 274px; }

  /* La imagen grande */
  .gallery__image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Cuando la imagen tiene un error */
  .gallery__image--error {
    border: 4px solid var(--color-danger-500);
    outline: 2px solid var(--color-danger-100);
    outline-offset: -6px;
    border-radius: var(--radius-md);
    box-sizing: border-box;
  }

  /* Botones de anterior y siguiente */
  .gallery__nav {
    position: absolute;
    top: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    padding: 10px 8px;
    z-index: 20;
  }

  .gallery__nav--prev { left: 0; }
  .gallery__nav--next { right: 0; }

  .gallery__nav-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: var(--radius-round);
    background: var(--color-neutral-0);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    padding: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    opacity: 0;  /* Se ven solo al pasar el ratón */
  }

  .gallery__main:hover .gallery__nav-btn { opacity: 1; }
  .gallery__nav-btn.visible { opacity: 1; }
  .gallery__nav-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .gallery__nav-btn:focus-visible { outline: 2px solid var(--color-brand-500); outline-offset: 2px; }
  .gallery__nav-btn svg { width: 24px; height: 24px; fill: var(--color-primary-700); }

/* ============================================================
     CAPTION — Texto sobre la imagen
     ============================================================
     Muestra el título y la descripción.
     Tiene un fondo degradado para que se lea bien.
     Si está vacío, el degradado desaparece.
     ============================================================ */
  .gallery__caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: white;
    font-size: 14px;
    z-index: 10;
  }

  .gallery__caption:empty {
    background: none;
    padding: 0;
  }

  .gallery__caption-title { font-weight: 600; font-size: 16px; margin-bottom: 2px; }
  .gallery__caption-desc { font-size: 13px; opacity: 0.85; }

  /* Tira de miniaturas */
  .gallery__thumbnails {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: var(--spacing-2xs);
    background: var(--color-neutral-0);
    border: 1px solid var(--border-secondary, var(--color-primary-100));
    border-radius: 0 0 var(--radius-md) var(--radius-md);
  }

  .gallery--large  .gallery__thumbnails,
  .gallery--medium .gallery__thumbnails { height: 110px; }
  .gallery--small  .gallery__thumbnails { height: 90px; }

  .gallery__thumb-scroll {
    display: flex;
    align-items: center;
    gap: var(--gap);
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .gallery--large  .gallery__thumb-scroll,
  .gallery--medium .gallery__thumb-scroll { height: 90px; }
  .gallery--small  .gallery__thumb-scroll { height: 74px; }

  .gallery__thumb-track {
    display: flex;
    gap: 8px;
    transition: transform 0.3s ease;
  }

  /* Cada miniatura */
  .gallery__thumb {
    flex-shrink: 0;
    border-radius: var(--radius-md);
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
    padding: 0;
    background: var(--color-primary-800);
    overflow: hidden;
  }

  .gallery--large  .gallery__thumb,
  .gallery--medium .gallery__thumb { width: 160px; height: 90px; }
  .gallery--small  .gallery__thumb { width: 130px; height: 74px; }

  .gallery__thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  .gallery__thumb:hover { border-color: #0061F4; opacity: 0.85; }
  .gallery__thumb:focus-visible { outline: 2px solid var(--color-brand-500); outline-offset: -3px; }
  .gallery__thumb--active { border-color: #0061F4; border-width: 4px; opacity: 1; }
  .gallery__thumb--error { border: 4px solid var(--color-danger-500); }

  /* Botones para desplazar las miniaturas */
  .gallery__thumb-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm, 4px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    padding: 8px;
    transition: all 0.15s;
    font-family: inherit;

    /* Default */
    background: var(--color-neutral-0);
    border: 1px solid var(--color-primary-100);
  }

  .gallery__thumb-btn svg { width: 24px; height: 24px; fill: var(--color-primary-700); }

  .gallery__thumb-btn:hover {
    background: #F4F4F6;
    border-color: var(--color-primary-100);
  }

  .gallery__thumb-btn:hover svg { fill: var(--color-primary-700); }

  .gallery__thumb-btn:focus-visible {
    outline: 2px solid var(--color-brand-500);
    outline-offset: 2px;
  }

  .gallery__thumb-btn:disabled {
    background: var(--color-primary-200);
    border-color: transparent;
    cursor: default;
    opacity: 0.4;
  }

  .gallery__thumb-btn:disabled svg { fill: var(--color-primary-400); }
</style>

<!-- ============================================================
     ESTRUCTURA HTML DE LA GALERÍA
     ============================================================
     La galería tiene 2 partes:
     1. El área principal con la imagen grande
     2. La tira de miniaturas debajo

     Cada parte tiene sus botones de navegación.
     ============================================================ -->

<div class="gallery" id="gallery" role="region"
     aria-roledescription="carousel"
     aria-label="Galería de imágenes"
     part="container">

  <!-- ========== ÁREA PRINCIPAL ========== -->
  <div class="gallery__main" id="galleryMain"
       role="group" aria-roledescription="slide"
       aria-live="polite" aria-atomic="true"
       part="slide">

    <!-- Botón anterior -->
    <div class="gallery__nav gallery__nav--prev">
      <button class="gallery__nav-btn" id="navPrevBtn"
              aria-label="Imagen anterior"
              aria-controls="galleryMain"
              part="prev-btn">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
        </svg>
      </button>
    </div>

    <!-- La imagen grande -->
    <img class="gallery__image" id="mainImage"
         src="" alt="" part="image" />

    <!-- Botón siguiente -->
    <div class="gallery__nav gallery__nav--next">
      <button class="gallery__nav-btn" id="navNextBtn"
              aria-label="Imagen siguiente"
              aria-controls="galleryMain"
              part="next-btn">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
        </svg>
      </button>
    </div>

    <!-- Texto explicativo sobre la imagen -->
    <div class="gallery__caption" id="caption"
         aria-live="polite" part="caption">
    </div>

    <!-- Botón de cerrar pantalla completa -->
    <button class="gallery__close-btn" id="closeBtn"
            part="close-btn"
            aria-label="Cerrar pantalla completa">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  </div>

  <!-- ========== TIRA DE MINIATURAS ========== -->
  <div class="gallery__thumbnails" id="thumbnails"
       role="region"
       aria-label="Miniaturas de la galería"
       part="thumbnails">

    <!-- Botón para ir a la izquierda -->
    <button class="gallery__thumb-btn" id="thumbPrev"
            aria-label="Anterior" part="thumb-prev">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
    </button>

    <!-- Contenedor de las miniaturas -->
    <div class="gallery__thumb-scroll">
      <div class="gallery__thumb-track" id="thumbTrack"
           role="tablist" aria-orientation="horizontal"
           aria-label="Lista de miniaturas"
           part="thumb-track"></div>
    </div>

    <!-- Botón para ir a la derecha -->
    <button class="gallery__thumb-btn" id="thumbNext"
            aria-label="Siguiente" part="thumb-next">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
      </svg>
    </button>
  </div>
</template>
